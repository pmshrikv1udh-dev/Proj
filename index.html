<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MNIST Digit Classifier</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            margin: auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background: #ff7eb3;
            border: none;
            padding: 10px 20px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #ff4f91;
        }

        img {
            margin-top: 20px;
            max-width: 200px;
            border-radius: 10px;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        .loader {
            display: none;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Digit Classifier</h1>

    <input type="file" id="imageInput" accept="image/*">
    <br>
    <button onclick="uploadImage()">Predict</button>

    <div class="loader" id="loader">⏳ Predicting...</div>

    <div>
        <img id="preview" src="" alt="">
    </div>

    <div class="result" id="result"></div>
</div>

<script>
    const input = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const resultDiv = document.getElementById("result");
    const loader = document.getElementById("loader");

    // Show preview
    input.addEventListener("change", function() {
        const file = input.files[0];
        if (file) {
            preview.src = URL.createObjectURL(file);
        }
    });

    async function uploadImage() {
        const file = input.files[0];

        if (!file) {
            alert("Please select an image first!");
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        loader.style.display = "block";
        resultDiv.innerHTML = "";

        try {
            const response = await fetch("https://proj-bg8o.onrender.com/predict", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            resultDiv.innerHTML = "Predicted Digit: " + data.predicted_digit;

        } catch (error) {
            resultDiv.innerHTML = "Error connecting to API!";
        }

        loader.style.display = "none";
    }
</script>

</body>
</html>
